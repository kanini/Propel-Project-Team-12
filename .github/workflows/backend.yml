name: CD - Deploy Backend via FTP

on:
  workflow_dispatch:

jobs:
  deploy:
    name: CD - Deploy to MonsterASP.NET via FTP
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Restore dependencies
        run: dotnet restore src/backend/PatientAccess.sln

      - name: Generate RSA Keys
        run: powershell -ExecutionPolicy Bypass -File scripts/GenerateRsaKeys.ps1

      - name: Publish
        run: dotnet publish src/backend/PatientAccess.Web/PatientAccess.Web.csproj --configuration Release --output ./publish --no-self-contained --runtime win-x86

      - name: Copy RSA keys into publish output
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "./publish/security/rsa-keys"
          Copy-Item "security/rsa-keys/public-key.xml" "./publish/security/rsa-keys/public-key.xml"
          Copy-Item "security/rsa-keys/private-key.xml" "./publish/security/rsa-keys/private-key.xml"

      - name: Set Development environment in web.config
        shell: bash
        run: |
          sed -i 's|stdoutLogEnabled="false"|stdoutLogEnabled="true"|g' ./publish/web.config
          sed -i 's|hostingModel="inprocess" />|hostingModel="inprocess">\n        <environmentVariables>\n          <environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Development" />\n        </environmentVariables>\n      </aspNetCore>|g' ./publish/web.config

      - name: Deploy via FTP using curl with retry
        shell: powershell
        run: |
          $ftpHost    = "ftp://site59724.siteasp.net"
          $ftpUser    = "site59724"
          $ftpPass    = "C+c87T#w%fP5"
          $localDir   = (Resolve-Path "./publish").Path
          $remoteBase = "/wwwroot"
          $maxRetries = 5
          $retryDelay = 10

          $files = Get-ChildItem -Path $localDir -Recurse -File

          foreach ($file in $files) {
            $relativePath = $file.FullName.Substring($localDir.Length).Replace("\", "/")
            $remoteUrl    = "$ftpHost$remoteBase$relativePath"

            $attempt  = 0
            $uploaded = $false

            while (-not $uploaded -and $attempt -lt $maxRetries) {
              $attempt++
              Write-Host "Uploading (attempt $attempt): $relativePath"

              $curlArgs = @(
                "--ftp-create-dirs",
                "--silent",
                "--show-error",
                "--retry", "0",
                "--user", "$ftpUser`:$ftpPass",
                "-T", $file.FullName,
                $remoteUrl
              )

              & curl.exe @curlArgs
              $exitCode = $LASTEXITCODE

              if ($exitCode -eq 0) {
                Write-Host "OK: $relativePath"
                $uploaded = $true
              } else {
                Write-Host "Failed (exit $exitCode): $relativePath"
                if ($attempt -lt $maxRetries) {
                  Write-Host "Retrying in $retryDelay seconds..."
                  Start-Sleep -Seconds $retryDelay
                } else {
                  Write-Host "FAILED after $maxRetries attempts: $relativePath"
                  exit 1
                }
              }
            }
          }

          Write-Host "Deployment complete"
