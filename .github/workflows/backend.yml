name: CD - Deploy Backend via FTP

on:
  workflow_dispatch:

jobs:
  deploy:
    name: CD - Deploy to MonsterASP.NET via FTP
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Restore dependencies
        run: dotnet restore src/backend/PatientAccess.sln

      - name: Generate RSA Keys
        run: powershell -ExecutionPolicy Bypass -File scripts/GenerateRsaKeys.ps1

      - name: Publish
        run: dotnet publish src/backend/PatientAccess.Web/PatientAccess.Web.csproj --configuration Release --output ./publish --no-self-contained --runtime win-x86

      - name: Copy RSA keys into publish output
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "./publish/security/rsa-keys"
          Copy-Item "security/rsa-keys/public-key.xml" "./publish/security/rsa-keys/public-key.xml"
          Copy-Item "security/rsa-keys/private-key.xml" "./publish/security/rsa-keys/private-key.xml"

      - name: Set Development environment in web.config
        shell: bash
        run: |
          sed -i 's|stdoutLogEnabled="false"|stdoutLogEnabled="true"|g' ./publish/web.config
          sed -i 's|hostingModel="inprocess" />|hostingModel="inprocess">\n        <environmentVariables>\n          <environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Development" />\n        </environmentVariables>\n      </aspNetCore>|g' ./publish/web.config

      - name: Deploy via FTP with retry on locked files
        shell: powershell
        run: |
          $ftpServer   = "ftp://site59724.siteasp.net"
          $ftpUser     = "site59724"
          $ftpPassword = "C+c87T#w%fP5"
          $localDir    = "./publish"
          $remoteDir   = "/wwwroot"
          $maxRetries  = 5
          $retryDelay  = 10  # seconds between retries

          function Upload-File($localPath, $remotePath) {
            $uri = "$ftpServer$remotePath"
            $attempt = 0
            while ($attempt -lt $maxRetries) {
              try {
                $attempt++
                $request = [System.Net.FtpWebRequest]::Create($uri)
                $request.Method = [System.Net.WebRequestMethods+Ftp]::UploadFile
                $request.Credentials = New-Object System.Net.NetworkCredential($ftpUser, $ftpPassword)
                $request.UseBinary = $true
                $request.UsePassive = $true
                $request.EnableSsl = $false
                $request.KeepAlive = $false

                $fileContent = [System.IO.File]::ReadAllBytes($localPath)
                $request.ContentLength = $fileContent.Length
                $stream = $request.GetRequestStream()
                $stream.Write($fileContent, 0, $fileContent.Length)
                $stream.Close()

                $response = $request.GetResponse()
                $response.Close()
                Write-Host "✅ Uploaded: $remotePath"
                return
              } catch {
                Write-Host "⚠️  Attempt $attempt failed for $remotePath : $_"
                if ($attempt -lt $maxRetries) {
                  Write-Host "   Retrying in $retryDelay seconds..."
                  Start-Sleep -Seconds $retryDelay
                } else {
                  Write-Host "❌ Failed after $maxRetries attempts: $remotePath"
                  throw
                }
              }
            }
          }

          function Ensure-RemoteDir($remotePath) {
            try {
              $uri = "$ftpServer$remotePath"
              $request = [System.Net.FtpWebRequest]::Create($uri)
              $request.Method = [System.Net.WebRequestMethods+Ftp]::MakeDirectory
              $request.Credentials = New-Object System.Net.NetworkCredential($ftpUser, $ftpPassword)
              $request.UsePassive = $true
              $request.EnableSsl = $false
              $response = $request.GetResponse()
              $response.Close()
              Write-Host "📁 Created dir: $remotePath"
            } catch {
              # Directory likely already exists, ignore
            }
          }

          # Walk all files in publish dir and upload
          $files = Get-ChildItem -Path $localDir -Recurse -File
          foreach ($file in $files) {
            $relativePath = $file.FullName.Substring((Resolve-Path $localDir).Path.Length).Replace("\", "/")
            $remotePath = "$remoteDir$relativePath"

            # Ensure parent directory exists
            $remoteParent = $remotePath.Substring(0, $remotePath.LastIndexOf("/"))
            Ensure-RemoteDir $remoteParent

            Upload-File $file.FullName $remotePath
          }

          Write-Host "🚀 Deployment complete!"
