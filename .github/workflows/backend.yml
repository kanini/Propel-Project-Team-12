name: CI/CD - Deploy Backend to MonsterASP.NET

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  ci:
    name: CI - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Restore dependencies
        run: dotnet restore backend/Backend.sln

      - name: Build
        run: dotnet build backend/Backend.sln --configuration Release --no-restore

  deploy:
    name: CD - Deploy to MonsterASP.NET via FTP
    runs-on: ubuntu-latest
    needs: ci
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Restore dependencies
        run: dotnet restore backend/Backend.sln

      - name: Publish
        run: dotnet publish backend/Backend.Api/Backend.Api.csproj --configuration Release --output ./publish --no-self-contained --runtime win-x86

      # Step 1 - Upload app_offline.htm to stop the running app (unlocks DLLs)
      - name: Take app offline
        run: |
          sudo apt-get install -y lftp
          echo "<h1>Site updating, please wait...</h1>" > app_offline.htm
          lftp -u site59724,${{ secrets.FTP_PASSWORD }} site59724.siteasp.net << 'FTPEOF'
          set ftp:passive-mode true
          set ssl:verify-certificate false
          put app_offline.htm -o /wwwroot/app_offline.htm
          bye
          FTPEOF

      # Step 2 - Wait for app to fully stop
      - name: Wait for app to stop
        run: sleep 10

      # Step 3 - Deploy all published files
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: site59724.siteasp.net
          username: site59724
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /wwwroot/
          port: 21
          protocol: ftp
          security: loose
          timeout: 120000
          dangerous-clean-slate: false
          exclude: |
            **/.ftp-deploy-sync-state.json

      # Step 4 - Delete app_offline.htm to bring app back online
      - name: Bring app back online
        run: |
          lftp -u site59724,${{ secrets.FTP_PASSWORD }} site59724.siteasp.net << 'FTPEOF'
          set ftp:passive-mode true
          set ssl:verify-certificate false
          rm /wwwroot/app_offline.htm
          bye
          FTPEOF
