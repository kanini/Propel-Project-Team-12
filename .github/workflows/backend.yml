name: CD - Deploy Backend via FTP

on:
  workflow_dispatch:

jobs:
  deploy:
    name: CD - Deploy to MonsterASP.NET via FTP
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Restore dependencies
        run: dotnet restore src/backend/PatientAccess.sln

      - name: Generate RSA Keys
        run: powershell -ExecutionPolicy Bypass -File scripts/GenerateRsaKeys.ps1

      - name: Publish
        run: dotnet publish src/backend/PatientAccess.Web/PatientAccess.Web.csproj --configuration Release --output ./publish --no-self-contained --runtime win-x86

      - name: Copy RSA keys into publish output
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "./publish/security/rsa-keys"
          Copy-Item "security/rsa-keys/public-key.xml" "./publish/security/rsa-keys/public-key.xml"
          Copy-Item "security/rsa-keys/private-key.xml" "./publish/security/rsa-keys/private-key.xml"

      - name: Set Development environment in web.config
        shell: bash
        run: |
          sed -i 's|stdoutLogEnabled="false"|stdoutLogEnabled="true"|g' ./publish/web.config
          sed -i 's|hostingModel="inprocess" />|hostingModel="inprocess">\n        <environmentVariables>\n          <environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Development" />\n        </environmentVariables>\n      </aspNetCore>|g' ./publish/web.config

      - name: Install WinSCP
        shell: powershell
        run: |
          choco install winscp -y --no-progress
          Import-Module "$env:ChocolateyInstall\lib\winscp\tools\WinSCPnet.dll"

      - name: Deploy via WinSCP FTP with retry
        shell: powershell
        run: |
          Add-Type -Path "$env:ChocolateyInstall\lib\winscp\tools\WinSCPnet.dll"

          $sessionOptions = New-Object WinSCP.SessionOptions -Property @{
            Protocol   = [WinSCP.Protocol]::Ftp
            HostName   = "site59724.siteasp.net"
            UserName   = "site59724"
            Password   = "C+c87T#w%fP5"
            FtpMode    = [WinSCP.FtpMode]::Passive
            FtpSecure  = [WinSCP.FtpSecure]::None
            PortNumber = 21
          }

          $session = New-Object WinSCP.Session

          try {
            $session.Open($sessionOptions)
            Write-Host "Connected to FTP server"

            $localDir  = (Resolve-Path "./publish").Path
            $remoteDir = "/wwwroot/"
            $maxRetries = 5
            $retryDelay = 10

            $files = Get-ChildItem -Path $localDir -Recurse -File

            foreach ($file in $files) {
              $relativePath = $file.FullName.Substring($localDir.Length).Replace("\", "/").TrimStart("/")
              $remotePath   = $remoteDir + $relativePath
              $remoteParent = $remotePath.Substring(0, $remotePath.LastIndexOf("/") + 1)

              if (-not $session.FileExists($remoteParent)) {
                $session.CreateDirectory($remoteParent)
                Write-Host "Created directory: $remoteParent"
              }

              $attempt = 0
              $uploaded = $false

              while (-not $uploaded -and $attempt -lt $maxRetries) {
                $attempt++
                try {
                  $transferOptions = New-Object WinSCP.TransferOptions
                  $transferOptions.TransferMode = [WinSCP.TransferMode]::Binary
                  $transferOptions.OverwriteMode = [WinSCP.OverwriteMode]::Overwrite

                  $result = $session.PutFiles($file.FullName, $remotePath, $false, $transferOptions)
                  $result.Check()

                  Write-Host "Uploaded ($attempt): $relativePath"
                  $uploaded = $true
                } catch {
                  Write-Host "Attempt $attempt failed for $relativePath - $($_.Exception.Message)"
                  if ($attempt -lt $maxRetries) {
                    Write-Host "Retrying in $retryDelay seconds..."
                    Start-Sleep -Seconds $retryDelay
                  } else {
                    Write-Host "FAILED after $maxRetries attempts: $relativePath"
                    throw
                  }
                }
              }
            }

            Write-Host "Deployment complete"
          } finally {
            $session.Dispose()
          }
