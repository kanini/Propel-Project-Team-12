name: CI/CD - Deploy Backend to MonsterASP.NET
on:
  workflow_dispatch:
jobs:
  ci:
    name: CI - Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0
      - name: Restore dependencies
        run: dotnet restore src/backend/PatientAccess.sln
      - name: Build
        run: dotnet build src/backend/PatientAccess.sln --configuration Release --no-restore
  deploy:
    name: CD - Deploy to MonsterASP.NET via FTP
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0
      - name: Restore dependencies
        run: dotnet restore src/backend/PatientAccess.sln
      - name: Publish
        run: dotnet publish src/backend/PatientAccess.Web/PatientAccess.Web.csproj --configuration Release --output ./publish --no-self-contained --runtime win-x86
      - name: Set Development environment in web.config
        run: |
          sed -i 's|stdoutLogEnabled="false"|stdoutLogEnabled="true"|g' ./publish/web.config
          sed -i 's|hostingModel="inprocess" />|hostingModel="inprocess">\n        <environmentVariables>\n          <environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Development" />\n        </environmentVariables>\n      </aspNetCore>|g' ./publish/web.config
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: site59724.siteasp.net
          username: site59724
          password: "C+c87T#w%fP5"
          local-dir: ./publish/
          server-dir: /wwwroot/
          port: 21
          protocol: ftp
          security: loose
          timeout: 300000
          dangerous-clean-slate: false
          log-level: verbose