name: CI/CD - Deploy Backend to MonsterASP.NET

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  ci:
    name: CI - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Restore dependencies
        run: dotnet restore backend/Backend.sln

      - name: Build
        run: dotnet build backend/Backend.sln --configuration Release --no-restore

  deploy:
    name: CD - Deploy to MonsterASP.NET via WebDeploy
    runs-on: windows-latest
    needs: ci
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Restore dependencies
        run: dotnet restore backend/Backend.sln

      - name: Publish
        run: dotnet publish backend/Backend.Api/Backend.Api.csproj --configuration Release --output ./publish --runtime win-x86 --no-self-contained

      - name: Deploy via WebDeploy
        run: |
          $publishDir = Resolve-Path "./publish"
          & "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" `
            -verb:sync `
            -source:contentPath="$publishDir" `
            -dest:contentPath="site59724",computerName="https://site59724.siteasp.net:8172/MSDeploy.axd?site=site59724",userName="site59724",password="C+c87T#w%fP5",authType="Basic",includeAcls="False" `
            -enableRule:AppOffline `
            -allowUntrusted
