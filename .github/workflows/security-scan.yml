# Security Scan Pipeline - SAST, SCA, Secrets Detection
# Implements: CICD-020 to CICD-029
#
# Trigger: Push to main/develop, weekly schedule

name: Security Scan

on:
  push:
    branches: [main, develop]
  schedule:
    # Weekly scan every Monday at 9 AM UTC (CICD spec: weekly dependency audit)
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ==========================================================================
  # SAST - CodeQL Analysis
  # CICD-020: CodeQL for JavaScript/TypeScript and C#
  # CICD-021: Fail on CRITICAL or HIGH severity findings
  # CICD-022: OWASP Top 10 vulnerability scanning
  # CICD-023: PHI data handling validation (HIPAA)
  # ==========================================================================
  codeql-javascript:
    name: SAST - CodeQL (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  codeql-csharp:
    name: SAST - CodeQL (C#)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-extended

      - name: Build for CodeQL
        run: |
          dotnet restore src/backend/PatientAccess.sln
          dotnet build src/backend/PatientAccess.sln --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"

  # ==========================================================================
  # SCA - Software Composition Analysis
  # CICD-024: npm dependency vulnerabilities
  # CICD-025: .NET package vulnerabilities
  # CICD-026: Fail on CRITICAL or HIGH severity
  # CICD-027: Generate SBOM in CycloneDX format
  # ==========================================================================
  sca-frontend:
    name: SCA - Frontend Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      # CICD-024: npm audit for high/critical vulnerabilities
      - name: Run npm audit
        working-directory: src/frontend
        run: npm audit --audit-level=high

      # CICD-027: Generate SBOM in CycloneDX format
      - name: Generate SBOM
        working-directory: src/frontend
        run: |
          npx @cyclonedx/cyclonedx-npm --output-file sbom-frontend.json
        continue-on-error: true

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-frontend
          path: src/frontend/sbom-frontend.json
          retention-days: 90

  sca-backend:
    name: SCA - Backend Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Restore dependencies
        run: dotnet restore src/backend/PatientAccess.sln

      # CICD-025, CICD-026: Vulnerable dependency check
      - name: Check vulnerable packages
        run: |
          OUTPUT=$(dotnet list src/backend/PatientAccess.sln package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected"
            exit 1
          fi

      # CICD-027: Generate SBOM in CycloneDX format
      - name: Install CycloneDX tool
        run: dotnet tool install --global CycloneDX

      - name: Generate SBOM
        run: |
          dotnet CycloneDX src/backend/PatientAccess.sln -o src/backend/sbom-backend.json -j
        continue-on-error: true

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-backend
          path: src/backend/sbom-backend.json
          retention-days: 90

  # ==========================================================================
  # Secrets Detection
  # CICD-028: GitLeaks for secrets in code and commit history
  # CICD-029: Fail on any detected secrets
  # ==========================================================================
  secrets-detection:
    name: Secrets Detection - GitLeaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Security Gate - All checks must pass
  # ==========================================================================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs:
      - codeql-javascript
      - codeql-csharp
      - sca-frontend
      - sca-backend
      - secrets-detection
    if: always()
    steps:
      - name: Evaluate security gates
        run: |
          FAILED=false
          if [ "${{ needs.codeql-javascript.result }}" != "success" ]; then
            echo "::error::CodeQL JavaScript/TypeScript analysis failed"
            FAILED=true
          fi
          if [ "${{ needs.codeql-csharp.result }}" != "success" ]; then
            echo "::error::CodeQL C# analysis failed"
            FAILED=true
          fi
          if [ "${{ needs.sca-frontend.result }}" != "success" ]; then
            echo "::error::Frontend SCA failed"
            FAILED=true
          fi
          if [ "${{ needs.sca-backend.result }}" != "success" ]; then
            echo "::error::Backend SCA failed"
            FAILED=true
          fi
          if [ "${{ needs.secrets-detection.result }}" != "success" ]; then
            echo "::error::Secrets detection failed - potential credential leak"
            FAILED=true
          fi
          if [ "$FAILED" = "true" ]; then
            echo "::error::Security gates failed. Deployment blocked."
            exit 1
          fi
          echo "All security gates passed"
