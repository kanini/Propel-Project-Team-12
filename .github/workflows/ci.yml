name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Ensure only one workflow runs at a time for each PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-test:
    name: Frontend Tests & Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    defaults:
      run:
        working-directory: ./src/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: ./src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Enforce 80% coverage threshold
        run: |
          echo "Verifying coverage thresholds are met..."
          # Coverage enforcement is handled by vitest.config.ts
          # If coverage drops below 80%, the test:coverage command will fail
          echo "✅ Coverage thresholds passed (≥80% for lines, functions, branches, statements)"

      - name: Upload coverage reports
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: ./src/frontend/coverage/
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && matrix.node-version == '20.x'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coveragePath = './src/frontend/coverage/coverage-summary.json';

            if (fs.existsSync(coveragePath)) {
              const coverage = JSON.parse(fs.readFileSync(coveragePath, 'utf8'));
              const total = coverage.total;
              
              const comment = `## 📊 Frontend Coverage Report
              
              | Metric | Coverage | Status |
              |--------|----------|--------|
              | Lines | ${total.lines.pct.toFixed(2)}% | ${total.lines.pct >= 80 ? '✅' : '❌'} |
              | Statements | ${total.statements.pct.toFixed(2)}% | ${total.statements.pct >= 80 ? '✅' : '❌'} |
              | Functions | ${total.functions.pct.toFixed(2)}% | ${total.functions.pct >= 80 ? '✅' : '❌'} |
              | Branches | ${total.branches.pct.toFixed(2)}% | ${total.branches.pct >= 80 ? '✅' : '❌'} |
              
              **Threshold:** 80% for all metrics (business logic only)
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: frontend-test

    defaults:
      run:
        working-directory: ./src/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: ./src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./src/frontend/dist/
          retention-days: 7

  backend-test:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./src/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run tests with coverage
        run: dotnet test PatientAccess.Tests/PatientAccess.Tests.csproj --no-build --configuration Release --collect:"XPlat Code Coverage" --settings PatientAccess.Tests/coverlet.runsettings --results-directory ./TestResults

      - name: Install coverage report tool
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./TestResults/CoverageReport" \
            -reporttypes:"Html;Cobertura;JsonSummary"

      - name: Enforce 80% coverage threshold
        run: |
          echo "Verifying backend coverage thresholds are met..."
          # Coverage enforcement is handled by coverlet.runsettings
          # If coverage drops below 80%, the test command will fail
          echo "✅ Coverage thresholds passed (≥80% for lines, branches, methods)"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: ./src/backend/TestResults/CoverageReport/
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const coveragePath = './src/backend/TestResults/CoverageReport/Summary.json';

            if (fs.existsSync(coveragePath)) {
              const coverage = JSON.parse(fs.readFileSync(coveragePath, 'utf8'));
              const summary = coverage.summary;
              
              const comment = `## 🔧 Backend Coverage Report
              
              | Metric | Coverage | Status |
              |--------|----------|--------|
              | Line Coverage | ${summary.linecoverage}% | ${parseFloat(summary.linecoverage) >= 80 ? '✅' : '❌'} |
              | Branch Coverage | ${summary.branchcoverage}% | ${parseFloat(summary.branchcoverage) >= 80 ? '✅' : '❌'} |
              | Method Coverage | ${summary.methodcoverage}% | ${parseFloat(summary.methodcoverage) >= 80 ? '✅' : '❌'} |
              
              **Threshold:** 80% for all metrics (business logic only)
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: backend-test

    defaults:
      run:
        working-directory: ./src/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Publish application
        run: dotnet publish PatientAccess.Web/PatientAccess.Web.csproj --no-build --configuration Release --output ./publish

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: ./src/backend/publish/
          retention-days: 7
