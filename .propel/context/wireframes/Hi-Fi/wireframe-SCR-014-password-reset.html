<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCR-014: Password Reset - PulseCare Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .btn-primary { background: #3b82f6; transition: all 200ms ease; }
        .btn-primary:hover:not(:disabled) { background: #2563eb; }
        .btn-primary:focus { outline: 2px solid #3b82f6; outline-offset: 2px; }
        .input-field { border: 1px solid #e5e7eb; transition: all 200ms ease; }
        .input-field:focus { outline: 2px solid #3b82f6; border-color: #3b82f6; }
        .input-field.error { border-color: #ef4444; }
    </style>
</head>
<body class="bg-neutral-50 min-h-screen flex items-center justify-center p-4">
    <!-- Navigation Map
    | Element | Action | Target Screen |
    |---------|--------|---------------|
    | #send-reset-btn | click | Send reset email → Success → SCR-013 (Login) |
    | #back-to-login | click | SCR-013 (Login) |
    -->
    
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <!-- Logo/Brand Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-4">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-700">Reset Your Password</h1>
                <p class="text-sm text-gray-500 mt-2">Enter your email address and we'll send you a link to reset your password</p>
            </div>
            
            <!-- Reset Form -->
            <form id="reset-form" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        class="input-field w-full px-4 py-3 rounded-lg text-base text-gray-700"
                        placeholder="john.doe@example.com"
                        aria-required="true"
                    />
                    <p id="email-error" class="text-sm text-red-500 mt-1 hidden"></p>
                </div>
                
                <button
                    type="submit"
                    id="send-reset-btn"
                    class="btn-primary w-full py-3 px-4 rounded-lg text-base font-medium text-white focus:outline-none"
                >
                    Send Reset Link
                </button>
                
                <!-- Success Message -->
                <div id="success-message" class="hidden bg-green-50 border border-green-200 rounded-lg p-4">
                    <div class="flex">
                        <svg class="w-5 h-5 text-green-500 mr-2" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                        </svg>
                        <p class="text-sm text-green-800">Reset link sent! Check your email for instructions.</p>
                    </div>
                </div>
            </form>
            
            <!-- Back to Login -->
            <div class="mt-6 text-center">
                <a href="wireframe-SCR-013-login.html" id="back-to-login" class="text-sm text-blue-500 hover:text-blue-600 font-medium">← Back to login</a>
            </div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('reset-form');
        const emailInput = document.getElementById('email');
        const sendBtn = document.getElementById('send-reset-btn');
        const successMsg = document.getElementById('success-message');
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<svg class="animate-spin h-5 w-5 mx-auto text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
            
            setTimeout(() => {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send Reset Link';
                successMsg.classList.remove('hidden');
                
                setTimeout(() => {
                    window.location.href = 'wireframe-SCR-013-login.html';
                }, 2000);
            }, 1500);
        });
    </script>
</body>
</html>
