<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCR-015: Account Activation - PulseCare Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .btn-primary { background: #3b82f6; transition: all 200ms ease; }
        .btn-primary:hover:not(:disabled) { background: #2563eb; }
        .btn-primary:focus { outline: 2px solid #3b82f6; outline-offset: 2px; }
        .input-field { border: 1px solid #e5e7eb; transition: all 200ms ease; }
        .input-field:focus { outline: 2px solid #3b82f6; border-color: #3b82f6; }
        .input-field.error { border-color: #ef4444; }
    </style>
</head>
<body class="bg-neutral-50 min-h-screen flex items-center justify-center p-4">
    <!-- Navigation Map
    | Element | Action | Target Screen |
    |---------|--------|---------------|
    | #activate-btn | click | Activate account → Success → SCR-013 (Login with success toast) |
    -->
    
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <!-- Logo/Brand Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4">
                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-700">Welcome to PulseCare</h1>
                <p class="text-sm text-gray-500 mt-2">Set up your password to activate your account</p>
            </div>
            
            <!-- Activation Form -->
            <form id="activation-form" class="space-y-6">
                <!-- Email (read-only, from activation link) -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input
                        type="email"
                        value="john.doe@example.com"
                        readonly
                        class="w-full px-4 py-3 rounded-lg text-base text-gray-500 bg-gray-100 border border-gray-300"
                    />
                </div>
                
                <!-- New Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="input-field w-full px-4 py-3 rounded-lg text-base text-gray-700"
                        placeholder="••••••••"
                        minlength="8"
                    />
                    <p class="text-xs text-gray-500 mt-1">Minimum 8 characters</p>
                    <p id="password-error" class="text-sm text-red-500 mt-1 hidden"></p>
                </div>
                
                <!-- Confirm Password -->
                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                    <input
                        type="password"
                        id="confirm-password"
                        name="confirm-password"
                        required
                        class="input-field w-full px-4 py-3 rounded-lg text-base text-gray-700"
                        placeholder="••••••••"
                    />
                    <p id="confirm-error" class="text-sm text-red-500 mt-1 hidden"></p>
                </div>
                
                <button
                    type="submit"
                    id="activate-btn"
                    class="btn-primary w-full py-3 px-4 rounded-lg text-base font-medium text-white"
                >
                    Activate Account
                </button>
            </form>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('activation-form');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm-password');
        const activateBtn = document.getElementById('activate-btn');
        
        confirmInput.addEventListener('blur', () => {
            const confirmError = document.getElementById('confirm-error');
            if (confirmInput.value !== passwordInput.value) {
                confirmInput.classList.add('error');
                confirmError.textContent = 'Passwords do not match';
                confirmError.classList.remove('hidden');
            } else {
                confirmInput.classList.remove('error');
                confirmError.classList.add('hidden');
            }
        });
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            if (confirmInput.value !== passwordInput.value) {
                return;
            }
            
            activateBtn.disabled = true;
            activateBtn.innerHTML = '<svg class="animate-spin h-5 w-5 mx-auto text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
            
            setTimeout(() => {
                window.location.href = 'wireframe-SCR-013-login.html?activated=true';
            }, 1500);
        });
    </script>
</body>
</html>
